services:
  mongo:
    image: mongo:7
    container_name: diyettakvim_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - diyettakvim_mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: diyettakvim_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - diyettakvim_redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: diyettakvim_rabbitmq
    restart: unless-stopped
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - diyettakvim_rabbitmq_data:/var/lib/rabbitmq

  backend:
    build:
      context: ./backend
    container_name: diyettakvim_backend
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
      - rabbitmq
    environment:
      NODE_ENV: production
      PORT: 5050
      MONGO_URI: mongodb://mongo:27017/diyettakvim
      JWT_SECRET: change-me
      JWT_REFRESH_SECRET: change-me-too
      APP_NAME: DiyetTakvim
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
      PUBLIC_API_URL: http://localhost:5050
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://rabbitmq
    ports:
      - "5050:5050"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5050
    container_name: diyettakvim_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  diyettakvim_mongo_data:
  diyettakvim_redis_data:
  diyettakvim_rabbitmq_data:
